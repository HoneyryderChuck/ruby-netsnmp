# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: Tests

on: [push]

jobs:
  tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "ruby-2.7"
          - "ruby-3.0"
          - "ruby-3.1"
          - "ruby-3.2"
          - "ruby-3.3"
          - "ruby-3.4"
          - "ruby-4.0"
          - "jruby"
          - "truffleruby"

    steps:
      - name: repo checkout
        uses: actions/checkout@v2
      - name: load ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        uses: adambirds/docker-compose-action@v1.5.0
        with:
          compose-file: |
            ./docker-compose.yml
            ./docker-compose-github.yml
            ./docker-compose-${{matrix.ruby}}.yml
          test-container: netsnmp
          test-command: /home/spec/support/specs.sh
        continue-on-error: ${{ matrix.ruby == 'jruby' || matrix.ruby == 'truffleruby' }}
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{matrix.ruby}}
          path: coverage/
          include-hidden-files: true

  coverage:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Download coverage results
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage

      - name: coverage
        env:
          CI: 1
        run: |
          ls -R
          find coverage -name "*resultset.json" -exec sed -i 's?${{ github.workspace }}?'`pwd`'?' {} \;
          bundle exec rake coverage:report

      - uses: joshmfrankel/simplecov-check-action@main
        if: ${{ github.repository == 'HoneyryderChuck/ruby-netsnmp' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}